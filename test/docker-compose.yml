name: nextcloudtest

services:
  db:
    image: mariadb:11.4.3
    restart: "no"
    environment:
      MYSQL_ROOT_PASSWORD: testroot
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloud
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  nextcloud:
    image: nextcloud:30.0.11-apache
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      NEXTCLOUD_ADMIN_USER: testadmin
      NEXTCLOUD_ADMIN_PASSWORD: testpassword123
      NEXTCLOUD_TRUSTED_DOMAINS: "nextcloud localhost 127.0.0.1"
      MYSQL_HOST: db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloud
      NEXTCLOUD_UPDATE: "0"
    volumes:
      - nc_data:/var/www/html
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -sf http://localhost/status.php | grep -q '\"installed\":true'"
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

volumes:
  db_data:
  nc_data:
